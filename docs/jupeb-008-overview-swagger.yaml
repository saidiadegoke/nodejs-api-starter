info:
  title: 'JUPEB 008 — Module map & documentation index'
  version: '1.0.0'
  description: |
    Cross-reference for JUPEB technical designs **001–008** and their Swagger UI entries.

    | Design doc | Topic | API base / Swagger |
    |------------|--------|---------------------|
    | `docs/001-jupeb-catalog-technical-design.md` | Universities & subject combinations | `/catalog` → `/docs/jupeb-001-catalog` |
    | `docs/002-jupeb-sessions-technical-design.md` | Registration sessions | `/sessions` → `/docs/jupeb-002-sessions` |
    | `docs/003-jupeb-identity-technical-design.md` | NIN & biometrics | `/identity` → `/docs/jupeb-003-identity` |
    | `docs/004-jupeb-submission-technical-design.md` | Document requirements & uploads | `/submission` → `/docs/jupeb-004-submission` |
    | `docs/005-jupeb-registration-technical-design.md` | Enrollment workflow & numbering preview | `/registration` (+ finalize on sessions) → `/docs/jupeb-005-registration` |
    | `docs/006-jupeb-finance-technical-design.md` | Payments linkage & reports | `/finance` (+ `/payments`) → `/docs/jupeb-006-finance` |
    | `docs/007-jupeb-academic-technical-design.md` | Grades & scores | `/academic` → `/docs/jupeb-007-academic` |
    | `docs/008-jupeb-modules-technical-design-index.md` | Index (this page) | — |
    | (API) | Admin — bind user to JUPEB university for institution scoping | `PATCH /admin/users/.../jupeb-university` → `/docs/jupeb-009-institution-scope` |

    **Mount:** JUPEB routes are mounted at the **API root** (e.g. `/catalog`, `/sessions`, `/registration`); see `src/routes/index.js` and `src/modules/jupeb/routes.js`.

    Consolidated notes also live in **`reg-portal-api/docs/jupeb-api-design.md`**.

servers:

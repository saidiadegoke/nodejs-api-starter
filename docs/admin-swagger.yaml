openapi: '3.0.0'
info:
  title: Admin
  version: '1.0.0'
  description: |
    Admin-only endpoints for observability and platform configuration.

    - **Error / request logs** — browse slow requests and 4xx/5xx responses captured by the request-log middleware.
    - **Platform settings** — runtime key/value (JSONB) config. Use for feature flags, rate-limit overrides, API-docs password, etc.
    - **Audit log** — chronological record of admin actions (e.g. setting changes). Extend by calling `AdminAuditService.log()` from your own controllers.

    All endpoints require a role of `admin` or `super_admin`.

servers:
  - url: http://localhost:5000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

paths:
  /admin/error-logs/stats:
    get:
      summary: Aggregate error + traffic stats
      tags: [Error Logs]
      responses:
        '200':
          description: Totals, 24h/hour error counts, success/error request counts, avg error duration

  /admin/error-logs:
    get:
      summary: List error / slow request logs
      tags: [Error Logs]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: type
          schema:
            type: string
            enum: [error, slow, 4xx, 5xx, all]
        - in: query
          name: method
          schema: { type: string }
        - in: query
          name: path
          schema: { type: string, description: 'ILIKE substring match' }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated log entries (summary view)

  /admin/error-logs/{id}:
    get:
      summary: Get a single log entry with full request / response bodies
      tags: [Error Logs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Full log entry

  /admin/settings:
    get:
      summary: List all platform settings
      tags: [Platform Settings]
      responses:
        '200':
          description: Array of settings
    put:
      summary: Upsert a platform setting
      tags: [Platform Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:
                  type: string
                  example: feature_flag_new_dashboard
                value:
                  description: JSONB value — any shape
                  example: true
                description:
                  type: string
      responses:
        '200':
          description: Setting upserted

  /admin/audit:
    get:
      summary: List admin audit log entries
      tags: [Audit Log]
      parameters:
        - in: query
          name: admin_user_id
          schema: { type: string, format: uuid }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: resource_type
          schema: { type: string }
        - in: query
          name: start_date
          schema: { type: string, format: date-time }
        - in: query
          name: end_date
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated audit log

openapi: '3.0.0'
info:
  title: Users
  version: '1.0.0'
  description: |
    User profile, activity, addresses, KYC, notification settings, and admin user listing.

    JUPEB: when migration `009_jupeb_enhancements` is applied, **`GET /users/me`** (and the profile returned after **`PUT /users/me`**) includes **`jupeb_university_id`** (nullable UUID) for institution scoping. Set it via `PATCH /admin/users/{userId}/jupeb-university` (see JUPEB 009 Swagger).

servers:
  - url: http://localhost:5000
    description: Local development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []

paths:
  /users:
    get:
      summary: List all users (admin)
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Paginated list of users
        '403':
          description: Forbidden

  /users/me:
    get:
      summary: Get current user profile
      tags: [Users]
      responses:
        '200':
          description: |
            Current user profile. Includes `jupeb_university_id` (nullable) when the profiles table has that column;
            use JUPEB admin `PATCH` to set or clear it.
        '401':
          description: Unauthorized
    put:
      summary: Update current user profile
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                display_name: { type: string }
                bio: { type: string }
                profile_photo_url: { type: string }
                date_of_birth: { type: string, format: date }
                gender: { type: string }
                preferred_language: { type: string }
                timezone: { type: string }
      responses:
        '200':
          description: Profile updated

  /users/me/stats:
    get:
      summary: Get current user statistics
      tags: [Users]
      responses:
        '200':
          description: User stats

  /users/me/permissions:
    get:
      summary: Get current user permissions
      tags: [Users]
      responses:
        '200':
          description: Array of permission strings

  /users/me/activities:
    get:
      summary: Get current user activities
      tags: [Users]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: activity_type
          schema: { type: string }
      responses:
        '200':
          description: Activity feed

  /users/me/activities/{activity_id}:
    delete:
      summary: Delete a user activity
      tags: [Users]
      parameters:
        - in: path
          name: activity_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Activity deleted
        '404':
          description: Not found

  /users/countries:
    get:
      summary: Get list of countries
      tags: [Users]
      security: []
      responses:
        '200':
          description: Countries list

  /users/me/settings/notifications:
    put:
      summary: Update notification settings
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email_notifications: { type: boolean }
                push_notifications: { type: boolean }
                sms_notifications: { type: boolean }
      responses:
        '200':
          description: Settings updated

  /users/me/addresses:
    get:
      summary: Get user addresses
      tags: [Users]
      responses:
        '200':
          description: Address list
    post:
      summary: Add new address
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [street, city, country_id]
              properties:
                label: { type: string }
                street: { type: string }
                city: { type: string }
                state: { type: string }
                postal_code: { type: string }
                country_id: { type: integer }
                is_default: { type: boolean }
      responses:
        '201':
          description: Address added

  /users/me/addresses/{address_id}:
    put:
      summary: Update an address
      tags: [Users]
      parameters:
        - in: path
          name: address_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Address updated
    delete:
      summary: Delete an address
      tags: [Users]
      parameters:
        - in: path
          name: address_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Address deleted

  /users/me/kyc:
    get:
      summary: Get current KYC status
      tags: [Users]
      responses:
        '200':
          description: KYC status
    post:
      summary: Submit KYC documents
      tags: [Users]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                document_type: { type: string }
                document_file: { type: string, format: binary }
      responses:
        '202':
          description: KYC submitted for review

  /users/{user_id}:
    get:
      summary: Get a user's public profile
      tags: [Users]
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: User profile

  /users/{user_id}/activities:
    get:
      summary: Get a user's public activities
      tags: [Users]
      security: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Activity feed

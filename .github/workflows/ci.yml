# Runs when api-template is the GitHub repository root.
# If this project lives inside a monorepo, move this file to the repo root
# under .github/workflows/ and set defaults.run.working-directory to api-template.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: api_template_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d api_template_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Write .env for CI
        run: |
          cat > .env << 'EOF'
          NODE_ENV=test
          PORT=5000
          API_BASE_URL=http://localhost:5000
          FRONTEND_URL=http://localhost:3000
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASSWORD=postgres
          DB_NAME=api_template_test
          JWT_SECRET=ci_jwt_secret_at_least_32_chars_long_abc
          JWT_REFRESH_SECRET=ci_refresh_secret_at_least_32_chars_xyz
          JWT_EXPIRES_IN=15m
          JWT_REFRESH_EXPIRES_IN=30d
          CORS_ORIGIN=http://localhost:3000
          RATE_LIMIT_ENABLED=false
          LOG_LEVEL=error
          EOF

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run seeds
        run: npm run seed

      - name: Run tests
        run: npm test
